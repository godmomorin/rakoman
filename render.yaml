services:
  - type: web
    name: rakoman
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    disk:
      name: rakoman-data
      mountPath: /var/data
      sizeGB: 5
    envVars:
      - key: DATA_DIR
        value: /var/data
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
